@if(product) {
<mat-card [ngClass]="{ 'text-center': !fullWidthMode }" class="p-3">
    <div [ngClass]="{ 'flex': fullWidthMode}">
        <img class="h-[200px] mb-1 mx-auto" 
            [ngClass]="{ 'h-[200px]': !fullWidthMode, 'h-[360px]': fullWidthMode }"
            [src]="product.imageUrl || 'https://placehold.co/150'" 
            alt="">
        <div class="w-full"
            [ngClass]="{ 'px-8 flex flex-col justify-between': fullWidthMode }">
            <div>
                <h5>{{ product.category }}</h5>
                <p class="truncate hover:whitespace-normal">{{ product.title }}</p>
                @if(fullWidthMode) {
                    <p class="">{{ product.description }}</p>
                }
            </div>
            <div class="flex items-center justify-between mt-4">
                <p class="text-lg font-bold">{{ product.price | currency }}</p>
                <button (click)="onAddToCart()" class="px-4 bg-blue-500 text-white rounded hover:bg-blue-600">
                    <mat-icon class="ml-1">add_shopping_cart</mat-icon>
                </button>
            </div>
        </div>
    </div>
</mat-card>
}
