@if(categories) {
<mat-expansion-panel class="mb-4" [expanded]="false">
  <mat-expansion-panel-header>
    <mat-panel-title>
      Categories
    </mat-panel-title>
  </mat-expansion-panel-header>
  <mat-selection-list [multiple]="false">
    @for (category of categories; track category) {
        <mat-list-option [value]="category" (click)="onShowCategory(category)">
            <button>{{ category }}</button>
        </mat-list-option>
    } @empty {
        No items found.
    }
  </mat-selection-list>
</mat-expansion-panel>
}
