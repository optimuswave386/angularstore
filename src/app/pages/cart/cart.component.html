<mat-card class="max-w-7xl mx-auto">
  <mat-card-header>
    <mat-card-title>Shopping Cart</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <table mat-table [dataSource]="dataSource" class="mat-elevation-1 w-full">
      <ng-container matColumnDef="product">
        <th mat-header-cell *matHeaderCellDef>Product</th>
        <td mat-cell *matCellDef="let item">
          <img alt="Product Image" [src]="item.product" width="50" height="50" />
        </td>
        <td mat-footer-cell *matFooterCellDef>
          <button mat-raised-button color="warn" aria-label="Continue Shopping" class="float-left">
            Continue Shopping
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let item">
          <span>{{ item.name }}</span>
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let item" >{{ item.price | currency }}</td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef>Quantity</th>
        <td mat-cell *matCellDef="let item">
          <span class="flex justify-center items-center">
          <button (click)="decreaseQuantity(item)" mat-icon-button color="primary" aria-label="Decrease quantity" (click)="item.quantity = item.quantity > 1 ? item.quantity - 1 : 1">
            <mat-icon>remove</mat-icon>
          </button>
          <span>{{ item.quantity }}</span>
          <button (click)="increaseQuantity(item)" mat-icon-button color="primary" aria-label="Increase quantity" >
            <mat-icon>add</mat-icon>
          </button>
          </span>
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <ng-container matColumnDef="total">
        <th mat-header-cell *matHeaderCellDef>Total</th>
        <td mat-cell *matCellDef="let item">{{ (item.price * item.quantity) | currency }}</td>
        <td mat-footer-cell *matFooterCellDef>{{ getTotalPrice() | currency }}</td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>
          <button mat-raised-button color="warn" aria-label="Remove all items" class="float-right">
            Clear All
          </button>
        </th>
        <td mat-cell *matCellDef="let item">
          <!-- Example action button -->
          <!-- In a real app, this would be a remove button -->
          <button (click)="removeItem(item)" mat-icon-button color="warn" aria-label="Remove item" class="float-right">
            <mat-icon>close</mat-icon>
          </button>
        </td>
        <td mat-footer-cell *matFooterCellDef></td>
      </ng-container>

      <!-- Header row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <!-- Data rows -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <!-- Footer row for total price -->
      <tr mat-footer-row *matFooterRowDef="displayedColumns" class="bg-gray-100 border-y"></tr>

    </table>
  </mat-card-content>
</mat-card>
